<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>alpcsk</title>
  <meta name="description" content="alpcsk.com" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <span class="brand">alpcsk</span>
    </div>
  </header>

  <main class="hero">
    <div class="container hero-inner">
      <p class="kicker">alpcsk.com</p>
      <h1>Yeni bir şey üzerinde çalışıyoruz</h1>
      <p class="lead">Site şu anda geliştiriliyor. Altyapı hazır ve çalışıyor; içerik çok yakında burada olacak.</p>
      <div class="meta-row">
        <span class="status"><span class="dot"></span>Sistem çalışıyor</span>
        <span class="divider"></span>
        <span class="muted">Yapım aşamasında</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span>&copy; <span id="year"></span> alpcsk</span>
      <span class="muted">alpcsk.com</span>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
